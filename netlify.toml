[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.clarity.ms https://*.clarity.ms https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net https://cal.com https://www.paypal.com https://*.paypal.com https://app.cal.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://dtjmhieeywdvhjxqyxad.supabase.co https://*.google-analytics.com https://*.googletagmanager.com https://www.facebook.com https://www.paypalobjects.com https://t.paypal.com; connect-src 'self' https://dtjmhieeywdvhjxqyxad.supabase.co https://*.google-analytics.com https://www.clarity.ms https://*.clarity.ms https://www.facebook.com https://cal.com https://www.paypal.com https://*.paypal.com; frame-src https://cal.com https://app.cal.com https://www.google.com https://www.youtube.com https://www.paypal.com https://*.paypal.com;"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"